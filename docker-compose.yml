services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: churn_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000
